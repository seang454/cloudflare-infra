apiVersion: v2
name: cloud-storage-platform
description: >
  Production Helm chart for a self-hosted cloud storage platform:
  Nextcloud (drive/UI) backed by MariaDB (metadata), Redis (file locking/cache),
  and MinIO (S3-compatible primary object storage). Each component is its own
  local subchart under charts/, using official upstream images directly
  (mariadb:11, redis:7-alpine, minio/minio) -- not Bitnami, see README for why.
type: application
version: 1.0.0
appVersion: "29"
keywords:
  - nextcloud
  - minio
  - object-storage
  - mariadb
  - redis
  - cloud-storage
maintainers:
  - name: Pengseang
home: https://github.com/nextcloud/docker
