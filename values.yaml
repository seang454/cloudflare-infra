# Default values for cloud-storage-platform.
# Optimized for small Kubernetes clusters

global:
  storageClass: "longhorn"
  domain: "nextcloud.seang.shop"

# ---------------------------------------------------------------------------
# MariaDB
# ---------------------------------------------------------------------------
mariadb:
  enabled: true
  image: mariadb
  imageTag: "11"
  replicaCount: 1

  auth:
    database: nextcloud
    username: nextcloud
    existingSecret: ""
    rootPassword: "CHANGE_ME_ROOT"
    password: "CHANGE_ME_APP"

  persistence:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi


# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image: redis
  imageTag: "7-alpine"

  existingSecret: ""
  password: "CHANGE_ME_REDIS"

  persistence:
    enabled: true
    size: 2Gi
    accessMode: ReadWriteOnce

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi


# ---------------------------------------------------------------------------
# MinIO
# ---------------------------------------------------------------------------
minio:
  enabled: true
  image: minio/minio
  imageTag: "latest"

  mode: standalone

  rootUser: minioadmin
  existingSecret: ""
  rootPassword: "CHANGE_ME_MINIO"

  bucketName: nextcloud-data

  persistence:
    enabled: true
    size: 20Gi
    accessMode: ReadWriteOnce

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  ingress:
    enabled: true

    console:
      host: "minio.seang.shop"


# ---------------------------------------------------------------------------
# Nextcloud
# ---------------------------------------------------------------------------
nextcloud:
  enabled: true

  # Single replica for small cluster
  replicaCount: 1

  image:
    repository: nextcloud
    tag: "29-fpm"
    pullPolicy: IfNotPresent


  nginx:
    image:
      repository: nginx
      tag: "1.27-alpine"


  admin:
    username: admin
    existingSecret: ""
    password: "CHANGE_ME_ADMIN"


  persistence:
    enabled: true

    # Longhorn supports RWO
    accessMode: ReadWriteOnce

    size: 5Gi


  resources:

    php:
      requests:
        cpu: 200m
        memory: 512Mi

      limits:
        cpu: "1"
        memory: 1Gi


    nginx:
      requests:
        cpu: 50m
        memory: 64Mi

      limits:
        cpu: 200m
        memory: 128Mi


  # Disable HPA because replicaCount is 1
  autoscaling:
    enabled: false


  ingress:
    enabled: true

    className: nginx

    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/proxy-body-size: "10G"

    tls:
      enabled: true
      secretName: nextcloud-tls


  podDisruptionBudget:
    enabled: true
    minAvailable: 1


  networkPolicy:
    enabled: true