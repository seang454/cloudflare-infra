apiVersion: v1
kind: Service
metadata:
  name: {{ include "minio.fullname" . }}
  labels:
    {{- include "minio.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "minio.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
---
# One-shot Job that creates the Nextcloud bucket on install/upgrade
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "minio.fullname" . }}-create-bucket
  labels:
    app.kubernetes.io/name: minio-create-bucket
    {{- include "minio.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "minio.secretName" . }}
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "minio.secretName" . }}
                  key: root-password
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set target http://{{ include "minio.fullname" . }}:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "waiting for minio..."; sleep 3;
              done
              mc mb -p target/{{ .Values.bucketName }} || true
              mc anonymous set none target/{{ .Values.bucketName }}
              echo "bucket {{ .Values.bucketName }} ready"
