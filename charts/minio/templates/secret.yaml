{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "minio.fullname" . }}-auth
  labels:
    {{- include "minio.labels" . | nindent 4 }}
type: Opaque
stringData:
  root-user: {{ .Values.rootUser | quote }}
  root-password: {{ .Values.rootPassword | quote }}
{{- end }}
