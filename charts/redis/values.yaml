# Defaults for the redis subchart. Overridden from the parent chart's
# values.yaml / environments/*.yaml under the `redis:` key.

image: redis
imageTag: "7-alpine"
existingSecret: ""
password: "CHANGE_ME_REDIS"

persistence:
  enabled: true
  size: 5Gi
  accessMode: ReadWriteOnce

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
