apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "nextcloud.fullname" . }}-cron
  labels:
    {{- include "nextcloud.labels" . | nindent 4 }}
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "nextcloud.labels" . | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              # REQUIRED (not preferred) — RWO PVC (Longhorn) can only be mounted
              # on the node that the main Nextcloud pod already holds it on.
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: nextcloud
                      app.kubernetes.io/instance: {{ .Release.Name }}
                  topologyKey: kubernetes.io/hostname
          initContainers:
            - name: wait-for-install
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  echo "Waiting for Nextcloud to finish installing..."
                  # config.php is created EARLY by the entrypoint (before occ install runs),
                  # so we must check for 'installed' => true inside it, not just file existence.
                  until grep -q "'installed' => true" /var/www/html/config/config.php 2>/dev/null; do
                    echo "Not installed yet (config.php missing or installed=false), sleeping 5s..."
                    sleep 5
                  done
                  echo "Nextcloud is fully installed. Proceeding."
              volumeMounts:
                - name: nextcloud-html
                  mountPath: /var/www/html
          containers:
            - name: nextcloud-cron
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["su", "-s", "/bin/sh", "www-data", "-c", "php -f /var/www/html/cron.php"]
              volumeMounts:
                - name: nextcloud-html
                  mountPath: /var/www/html
              env:
                - name: MYSQL_HOST
                  value: {{ include "nextcloud.mariadb.host" . }}
                - name: MYSQL_DATABASE
                  value: {{ .Values.database.name | quote }}
                - name: MYSQL_USER
                  value: {{ .Values.database.username | quote }}
                - name: MYSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.database.existingSecret | default (printf "%s-mariadb-auth" .Release.Name) }}
                      key: mariadb-password
                - name: REDIS_HOST
                  value: {{ include "nextcloud.redis.host" . }}
                - name: REDIS_HOST_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-redis-auth" .Release.Name }}
                      key: redis-password
          volumes:
            - name: nextcloud-html
              persistentVolumeClaim:
                claimName: {{ include "nextcloud.fullname" . }}-html
