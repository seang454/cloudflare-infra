# Defaults for the nextcloud subchart.
# Optimized for:
# - Single Nextcloud replica
# - Longhorn RWO storage
# - Kubernetes small cluster


# ---------------------------------------------------------------------------
# Nextcloud
# ---------------------------------------------------------------------------

replicaCount: 1


image:
  repository: nextcloud
  tag: "29-fpm"
  pullPolicy: IfNotPresent


# ---------------------------------------------------------------------------
# Nginx sidecar
# ---------------------------------------------------------------------------

nginx:
  image:
    repository: nginx
    tag: "1.27-alpine"



# ---------------------------------------------------------------------------
# Admin user
# ---------------------------------------------------------------------------

admin:
  username: admin
  existingSecret: ""
  password: "CHANGE_ME_ADMIN"



# ---------------------------------------------------------------------------
# Database
# MariaDB
# ---------------------------------------------------------------------------

database:

  name: nextcloud

  username: nextcloud

  # Empty means use generated MariaDB secret
  existingSecret: ""



# ---------------------------------------------------------------------------
# Persistent Storage
#
# Longhorn default:
# ReadWriteOnce
#
# Do NOT use ReadWriteMany unless you have RWX storage.
# ---------------------------------------------------------------------------

persistence:

  enabled: true

  accessMode: ReadWriteOnce

  size: 5Gi



# ---------------------------------------------------------------------------
# Object Storage
# MinIO / S3
# ---------------------------------------------------------------------------

objectStore:

  bucket: nextcloud-data

  port: 9000

  ssl: false

  region: us-east-1

  usePathStyle: true

  existingSecret: ""



# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------

resources:

  php:

    requests:
      cpu: 200m
      memory: 512Mi

    limits:
      cpu: "1"
      memory: 1Gi


  nginx:

    requests:
      cpu: 50m
      memory: 64Mi

    limits:
      cpu: 200m
      memory: 128Mi



# ---------------------------------------------------------------------------
# Autoscaling
#
# Disabled because:
# replicaCount = 1
# PVC = ReadWriteOnce
# ---------------------------------------------------------------------------

autoscaling:

  enabled: false



# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------

ingress:

  enabled: true

  className: "nginx"


  annotations:

    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    nginx.ingress.kubernetes.io/proxy-body-size: "10G"


  tls:

    enabled: true

    secretName: nextcloud-tls



# ---------------------------------------------------------------------------
# Pod Disruption Budget
#
# Disabled because only one replica.
# ---------------------------------------------------------------------------

podDisruptionBudget:

  enabled: false



# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------

networkPolicy:

  enabled: true



# ---------------------------------------------------------------------------
# Service Account
# ---------------------------------------------------------------------------

serviceAccount:

  create: true

  name: ""



# ---------------------------------------------------------------------------
# PHP Settings
# ---------------------------------------------------------------------------

phpMemoryLimit: "1024M"

phpUploadLimit: "10G"