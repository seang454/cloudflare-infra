# helm install csp-staging . -f environments/staging-values.yaml -n nextcloud-staging --create-namespace

global:
  storageClass: "longhorn"
  domain: "nextcloud-test.seang.shop"

mariadb:
  persistence:
    size: 1Gi

redis:
  persistence:
    size: 1Gi

minio:
  persistence:
    size: 1Gi
  ingress:
    enabled: true
    console:
      host: "minio-test.seang.shop"

nextcloud:
  # Single replica required — Longhorn uses RWO (ReadWriteOnce).
  # Two pods on an RWO PVC causes php-fpm Exit 65 crashes.
  replicaCount: 1
  autoscaling:
    enabled: false
  persistence:
    accessMode: ReadWriteOnce
    size: 1Gi
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-staging"
